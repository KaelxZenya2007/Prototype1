
<!DOCTYPE html>
<html>
<head>
<title>Lords Mobile Toolkit - Integrated</title>
<style>
    /* --- GLOBAL FIXES --- */
    body{ font-family:Arial; background:#f4f4f4; text-align:center; margin:0; padding:20px; }
    .container{ max-width:700px; margin:auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2); position: relative; }
    
    /* FIX: Force buttons and inputs to be block-level to prevent side-by-side snapping */
    button { 
        display: block; 
        width: 260px; 
        margin: 10px auto; 
        padding: 10px 15px; 
        border: none; 
        border-radius: 6px; 
        background: #007bff; 
        color: white; 
        cursor: pointer; 
        font-weight: bold; 
    }
    button:hover{ background:#0056b3; }

    input { 
        display: block; 
        width: 260px; 
        margin: 10px auto; 
        padding: 10px; 
        text-align: center; 
        border: 1px solid #ccc; 
        border-radius: 4px; 
        box-sizing: border-box; /* Crucial for width alignment */
    }

    select { 
        display: block; 
        width: 260px; 
        margin: 10px auto; 
        padding: 10px; 
        border-radius: 4px; 
    }

    .tool { display:none; padding-bottom: 20px; }

    /* FIX: Guide alignment */
    .guide { 
        display: none; 
        background: #eef; 
        padding: 15px; 
        border-radius: 6px; 
        margin: 15px auto; 
        font-size: 14px; 
        width: 260px; 
        box-sizing: border-box;
        border: 1px solid #ccd;
    }

    /* --- TROOP CALCULATOR FIXES --- */
    .game-icon { height: 20px; width: auto; vertical-align: middle; background: #eee; border-radius: 3px; }
    .sticky-stats { position: sticky; top: -20px; z-index: 100; background: #fdfdfd; padding: 10px; display: flex; justify-content: space-around; border-bottom: 2px solid #eee; margin-bottom: 15px; }
    .stat-item { display: flex; align-items: center; font-weight: 800; font-size: 16px; gap: 6px; color: #333; }
    
    /* Settings Grid */
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
    .settings-grid input { width: 100%; margin: 0; } /* Overrides global block margin for grid */
    
    .tier-row { border-bottom: 1px solid #eee; padding: 15px 0; }
    .tier-header { font-weight: 800; color: #007bff; margin-bottom: 10px; font-size: 14px; }
    .tier-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    
    /* Keep Troop Inputs Inline inside the grid */
    .troop-box input { display: inline-block; width: 100%; padding: 6px 2px; margin: 0; font-size: 12px; }
    .troop-box label { display: block; font-size: 9px; font-weight: bold; color: #888; }

    /* Result Overlay */
    .resultTab{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index: 999; }
    .resultBox{ background:white; padding:25px; border-radius:10px; width:340px; position:relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .closeBtn{ position:absolute; right:12px; top:8px; font-weight:bold; cursor:pointer; color:red; font-size: 20px; }
    .resultGrid{ display:grid; grid-template-columns:1fr auto; row-gap:8px; margin-top:15px; font-size:16px; }
    .resultGrid div{ text-align:left; display: flex; align-items: center; gap: 8px; }
    .resultGrid span{ text-align:right; font-weight: bold; }
    .totalRow{ margin-top:15px; padding-top:10px; border-top:2px solid #ccc; font-weight:bold; display:grid; grid-template-columns:1fr auto; color: #007bff; font-size: 18px; }
    .precise-time { font-family: monospace; background: #333; color: #00ff00; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 20px; }
</style>
</head>
<body>

<div class="container">
    <h1>Lords Mobile Toolkit</h1>

    <div id="toolsMenu">
        <h2>Tools</h2>
        <button onclick="openTool('speedTool')">Speed Up Calculator</button>
        <button onclick="openTool('gemTool')">Gem Prediction</button>
        <button onclick="openTool('troopTool')" style="background:#28a745">Troop Calculator</button>
    </div>

    <div id="speedTool" class="tool">
        <button onclick="backTools()" style="background:#6c757d; width: 100px;">← Back</button>
        <h2>Speed Up Calculator</h2>
        <button onclick="toggleGuide('speedGuide')">Show Guide</button>
        <div id="speedGuide" class="guide">Enter the quantity of each speed up item you have. The calculator will provide the total time.</div>
        
        <select id="speedEvent">
            <option value="1">Normal Speed (100%)</option>
            <option value="1.2">120% Speed Event</option>
        </select>
        
        <input id="d1" placeholder="1 min">
        <input id="d5" placeholder="5 min">
        <input id="d10" placeholder="10 min">
        <input id="d15" placeholder="15 min">
        <input id="d30" placeholder="30 min">
        <input id="h1" placeholder="1 hour">
        <input id="h3" placeholder="3 hour">
        <input id="h8" placeholder="8 hour">
        <input id="h15" placeholder="15 hour">
        <input id="h24" placeholder="24 hour">
        <input id="d3" placeholder="3 day">
        <input id="d7" placeholder="7 day">
        <input id="d14" placeholder="14 day">
        <input id="d30s" placeholder="30 day">
        
        <button onclick="calculateSpeed()">Calculate Total</button>
        <button onclick="clearInputs('speedTool')" style="background:#6c757d">Clear All</button>
    </div>

    <div id="gemTool" class="tool">
        <button onclick="backTools()" style="background:#6c757d; width: 100px;">← Back</button>
        <h2>Gem Prediction</h2>
        <button onclick="toggleGuide('gemGuide')">Show Guide</button>
        <div id="gemGuide" class="guide">Predict your gems after 30 days based on your current income sources.</div>
        
        <input id="colo" placeholder="Colosseum Gems (Every 3h)">
        <input id="guild" placeholder="Daily Guild Gifts">
        <input id="monster" placeholder="Daily Monster Hunt">
        <input id="eventgems" placeholder="Weekly Event Gems">
        <input id="treasure" placeholder="Treasure Trove Deposit">
        <input id="basic" placeholder="Basic Interest %">
        <input id="bonus" placeholder="Bonus Interest %">
        
        <button onclick="calculateGems()">Predict 30 Days</button>
        <button onclick="clearInputs('gemTool')" style="background:#6c757d">Clear</button>
    </div>

    <div id="troopTool" class="tool">
        <button onclick="backTools()" style="background:#6c757d; width: 100px;">← Back</button>
        <div class="sticky-stats">
            <div class="stat-item"><img id="h-army" class="game-icon"> <span id="live-a">0</span></div>
            <div class="stat-item"><img id="h-might" class="game-icon"> <span id="live-m">0</span></div>
        </div>
        <div class="settings-grid">
            <div class="input-group"><label>Training Speed %</label><input type="number" id="tSpeed" placeholder="475.05"></div>
            <div class="input-group"><label>T1/T2 Sub %</label><input type="number" id="s12" placeholder="40"></div>
            <div class="input-group"><label>T3/T4 Sub %</label><input type="number" id="s34" placeholder="30"></div>
            <div class="input-group"><label>120% Event</label><input type="checkbox" id="troopEvent" style="width:20px; height:20px;"></div>
        </div>
        <div id="tier-container"></div>
        <button onclick="calculateTroops()" style="background:#28a745; width:80%;">CALCULATE RESOURCES</button>
        <button onclick="clearInputs('troopTool')" style="background:#6c757d">Reset All</button>
    </div>
</div>

<div id="resultTab" class="resultTab">
    <div class="resultBox">
        <span class="closeBtn" onclick="closeResult()">X</span>
        <div id="resultContent"></div>
    </div>
</div>

<script>
    /* Navigation remains the same */
    function openTool(id){
        document.getElementById("toolsMenu").style.display="none";
        document.getElementById(id).style.display="block";
    }
    function backTools(){
        document.getElementById("toolsMenu").style.display="block";
        document.querySelectorAll(".tool").forEach(t => t.style.display="none");
    }
    function toggleGuide(id){
        let g=document.getElementById(id);
        g.style.display=(g.style.display==="block")?"none":"block";
    }

    /* Formatting and Parsing logic remains the same */
    function showResult(content){
        document.getElementById("resultContent").innerHTML=content;
        document.getElementById("resultTab").style.display="flex";
    }
    function closeResult(){ document.getElementById("resultTab").style.display="none"; }
    function parseInput(id){
        let v=document.getElementById(id).value.replace(/,/g,'');
        return Number(v)||0;
    }
    function formatInput(input){
        let v=input.value.replace(/[^0-9]/g,'');
        if(v===""){ input.value=""; return; }
        input.value=Number(v).toLocaleString();
    }
    document.querySelectorAll("input").forEach(i=>{
        i.addEventListener("input",()=> { if(i.type !== 'number' && i.type !== 'checkbox') formatInput(i); });
    });
    function clearInputs(toolId){
        document.querySelectorAll("#"+toolId+" input").forEach(i=>{ 
            if(i.type === 'checkbox') i.checked = false;
            else i.value=""; 
        });
        if(toolId === 'troopTool') updateLiveStats();
    }

    /* CALCULATIONS (UNCHANGED) */
    function calculateSpeed(){
        let multiplier=document.getElementById("speedEvent").value;
        let totalMinutes = parseInput("d1")*1+parseInput("d5")*5+parseInput("d10")*10+parseInput("d15")*15+parseInput("d30")*30+
                           parseInput("h1")*60+parseInput("h3")*180+parseInput("h8")*480+parseInput("h15")*900+parseInput("h24")*1440+
                           parseInput("d3")*4320+parseInput("d7")*10080+parseInput("d14")*20160+parseInput("d30s")*43200;
        totalMinutes *= multiplier;
        let days=Math.floor(totalMinutes/1440), hours=Math.floor((totalMinutes%1440)/60), mins=Math.floor(totalMinutes%60);
        showResult("<h3>Total Speed</h3><div class='precise-time'>"+days+"d "+hours+"h "+mins+"m</div>");
    }

    function calculateGems(){
        let colo=parseInput("colo"), guild=parseInput("guild"), monster=parseInput("monster"), ev=parseInput("eventgems"), tr=parseInput("treasure"), ba=parseInput("basic"), bo=parseInput("bonus");
        let rColo=Math.floor(colo*8*30), rGuild=Math.floor(guild*30), rMonster=Math.floor(monster*15), rEvent=Math.floor(ev*3), rTreasure=Math.floor(tr*(100+ba+bo)/100);
        let total=rColo+rGuild+rMonster+rEvent+rTreasure;
        showResult("<h3>30-Day Forecast</h3><div class='resultGrid'><div>Colosseum</div><span>"+rColo.toLocaleString()+"</span><div>Guild</div><span>"+rGuild.toLocaleString()+"</span><div>Monster</div><span>"+rMonster.toLocaleString()+"</span><div>Event</div><span>"+rEvent.toLocaleString()+"</span><div>Treasure</div><span>"+rTreasure.toLocaleString()+"</span></div><div class='totalRow'><div>TOTAL GEMS</div><span>"+total.toLocaleString()+"</span></div>");
    }

    /* TROOP CONFIG & GENERATION */
    const ICONS = {
        army: "Picsart_26-03-19_23-38-15-683.png", might: "Picsart_26-03-17_22-24-27-109.png",
        food: "Picsart_26-03-17_22-31-19-118.png", stone: "Picsart_26-03-17_22-31-37-917.png",
        wood: "Picsart_26-03-17_22-31-57-627.png", ore: "Picsart_26-03-17_22-32-16-895.png", gold: "Picsart_26-03-17_22-32-37-505.png"
    };

    const tiers = [1,2,3,4], types = ["Inf", "Ran", "Cav", "Siege"];
    const mPwr = {1:2, 2:8, 3:24, 4:36}, tBase = {1:15, 2:30, 3:60, 4:120};
    const rBase = {
        1: {f:50, w:50, s:0, o:50, g:0}, 2: {f:100, w:100, s:100, o:0, g:5},
        3: {f:150, w:0, s:150, o:150, g:10}, 4: {f:1000, w:1000, s:1000, o:1000, g:500}
    };

    function formatAbbr(n) {
        if (n >= 1e9) return (n/1e9).toFixed(1) + 'b';
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'm';
        return Math.floor(n).toLocaleString();
    }

    function updateLiveStats() {
        let a = 0, m = 0;
        document.querySelectorAll('.troop-box input').forEach(i => {
            let v = parseInt(i.value.replace(/,/g,'')) || 0;
            a += v; m += v * mPwr[i.dataset.t];
        });
        document.getElementById('live-a').innerText = formatAbbr(a);
        document.getElementById('live-m').innerText = formatAbbr(m);
    }

    function calculateTroops() {
        const spd = parseFloat(document.getElementById('tSpeed').value) || 475.05;
        const s12 = (parseFloat(document.getElementById('s12').value) || 0)/100;
        const s34 = (parseFloat(document.getElementById('s34').value) || 0)/100;
        const mult = (1 + (spd/100)) * (document.getElementById('troopEvent').checked ? 1.2 : 1);
        let r = { a:0, m:0, f:0, w:0, s:0, o:0, g:0, sec:0 };

        tiers.forEach(t => {
            let sub = t <= 2 ? s12 : s34;
            types.forEach(ty => {
                let q = parseInt(document.getElementById(`t${t}${ty}`).value.replace(/,/g,'')) || 0;
                if(q <= 0) return;
                r.a += q; r.m += q * mPwr[t]; r.sec += (q * tBase[t]) / mult;
                r.f += (rBase[t].f * (1-sub)) * q; r.w += (rBase[t].w * (1-sub)) * q;
                r.s += (rBase[t].s * (1-sub)) * q; r.o += (rBase[t].o * (1-sub)) * q;
                r.g += (rBase[t].g * (1-sub)) * q;
            });
        });

        let sT = Math.ceil(r.sec);
        let d = Math.floor(sT/86400), h = Math.floor((sT%86400)/3600), m = Math.floor((sT%3600)/60), s = sT%60;
        const line = (key, label, val) => `<div><img src="${ICONS[key]}" class="game-icon" onerror="this.style.display='none'"> ${label}</div><span>${formatAbbr(val)}</span>`;
        
        let content = `<h3>Requirements</h3><div class='precise-time'>${d}d ${h}h ${m}m ${s}s</div><div class='resultGrid'>` +
            line('army', 'Army', r.a) + line('might', 'Might', r.m) + line('food', 'Food', r.f) + 
            line('wood', 'Wood', r.w) + line('stone', 'Stone', r.s) + line('ore', 'Ore', r.o) + line('gold', 'Gold', r.g) +
            `</div><div class='totalRow'><div>EST. DAYS</div><span>${sT > 0 ? d+1 : 0} Days</span></div>`;
        
        showResult(content);
    }

    const tierContainer = document.getElementById('tier-container');
    tiers.forEach(t => {
        let row = document.createElement('div'); row.className = 'tier-row';
        row.innerHTML = `<div class="tier-header">UNIT TIER ${t}</div><div class="tier-grid"></div>`;
        types.forEach(ty => {
            let box = document.createElement('div'); box.className = 'troop-box';
            box.innerHTML = `<label>${ty.toUpperCase()}</label><input type="text" id="t${t}${ty}" data-t="${t}" placeholder="0">`;
            box.querySelector('input').addEventListener('input', (e) => {
                let v = e.target.value.replace(/\D/g,'');
                e.target.value = v ? Number(v).toLocaleString() : '';
                updateLiveStats();
            });
            row.querySelector('.tier-grid').appendChild(box);
        });
        tierContainer.appendChild(row);
    });

    // Set initial icons if they exist
    document.getElementById('h-army').src = ICONS.army;
    document.getElementById('h-might').src = ICONS.might;
</script>
</body>
</html>
