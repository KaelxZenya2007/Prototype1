
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lords Mobile Toolkit</title>
<style>
    /* =========================================
       1. GLOBAL TOOLKIT STYLES (Light Theme)
       ========================================= */
    * { box-sizing: border-box; }
    html, body { overflow-x: hidden; width: 100%; }
    body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #f4f4f4; text-align: center; margin: 0; padding: 10px; color: #333; }
    
    .container { max-width: 900px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { margin-top: 5px; font-size: 24px; }
    h2 { margin-top: 5px; }
    
    .menu-btn { display: block; width: 100%; max-width: 280px; margin: 10px auto; padding: 12px; border: none; border-radius: 8px; background: #007bff; color: white; cursor: pointer; font-weight: bold; font-size: 15px; }
    .menu-btn:hover { background: #0056b3; }
    .tool-input, .tool-select { display: block; width: 100%; max-width: 280px; margin: 10px auto; padding: 12px; border: 1px solid #ccc; border-radius: 6px; text-align: center; font-size: 14px; }
    
    .tool { display: none; width: 100%; padding-bottom: 10px; }
    .guide { display: none; background: #eef; padding: 15px; border-radius: 6px; margin: 15px auto; font-size: 14px; max-width: 280px; border: 1px solid #ccd; text-align: left; }

    /* =========================================
       2. TROOP & CALC CSS
       ========================================= */
    .game-icon { height: 20px; width: auto; vertical-align: middle; background: #eee; border-radius: 3px; }
    .sticky-stats { position: sticky; top: 0; z-index: 10; background: #fff; padding: 10px 0; display: flex; justify-content: space-around; border-bottom: 2px solid #eee; margin-bottom: 15px; }
    .stat-item { display: flex; align-items: center; font-weight: 800; font-size: 16px; gap: 6px; color: #333; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #eee; }
    .input-group { display: flex; flex-direction: column; justify-content: flex-end; height: 100%; text-align: left; }
    .input-group label { font-size: 10px; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 4px; }
    .input-group input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin: 0; }
    .input-group input[type="checkbox"] { width: 20px; height: 20px; margin: 8px 0; cursor: pointer; }
    .tier-row { border-bottom: 1px solid #eee; padding: 15px 0; }
    
    /* UPDATED: Tier Labels Centered */
    .tier-header { font-weight: 800; color: #007bff; margin-bottom: 10px; font-size: 14px; text-align: center; } 
    
    .tier-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .troop-box input { width: 100%; padding: 8px 4px; margin: 0; font-size: 13px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
    .troop-box label { display: block; font-size: 10px; font-weight: bold; color: #888; text-align: center; margin-bottom: 3px; }
    
    /* NEW: Image Box styling for troops */
    .troop-img { width: 35px; height: 35px; object-fit: cover; border-radius: 4px; background: #eaeaea; display: block; margin: 0 auto 5px auto; border: 1px solid #ddd; }

    /* Result Overlay (Toolkit) */
    .resultTab { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
    .resultBox { background: white; padding: 25px; border-radius: 10px; width: 100%; max-width: 360px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .closeBtn { position: absolute; right: 15px; top: 10px; font-weight: bold; cursor: pointer; color: red; font-size: 20px; }
    .resultGrid { display: grid; grid-template-columns: 1fr auto; row-gap: 8px; margin-top: 15px; font-size: 15px; }
    .resultGrid div { text-align: left; display: flex; align-items: center; gap: 8px; }
    .totalRow { margin-top: 15px; padding-top: 10px; border-top: 2px solid #ccc; font-weight: bold; display: grid; grid-template-columns: 1fr auto; color: #007bff; font-size: 18px; }
    .precise-time { font-family: monospace; background: #333; color: #00ff00; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 18px; text-align: center; }

    /* =========================================
       3. GEAR SIMULATOR CSS
       ========================================= */
    #gearTool {
      --bg: #0f1220; --panel: #1a1f3a; --panel-2: #202644; --text: #fff; 
      --muted: #b6bddf; --accent: #7c9cff; --border: rgba(255,255,255,0.08);
      --danger: #ff4d4d; --danger-dark: #cc0000;
      background: var(--bg); color: var(--text); padding: 15px; border-radius: 12px; margin-top: 10px;
    }
    #gearTool .wrap { max-width: 1000px; margin: 0 auto; }
    #gearTool .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; flex-wrap: wrap; }
    #gearTool .tabs { display: flex; gap: 5px; }
    #gearTool .tab { padding: 8px 16px; background: var(--panel); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; cursor: pointer; transition: 0.2s; font-size:14px; font-family: inherit;}
    #gearTool .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    #gearTool .reset-all-btn { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; font-family: inherit;}
    #gearTool .reset-all-btn:hover { background: var(--danger-dark); }
    
    /* Categorized Stats Display */
    #gearTool .stats-container { background: var(--panel); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); display: flex; gap: 15px; }
    #gearTool .stat-col { flex: 1; text-align: left; }
    #gearTool .stat-col-divider { width: 1px; background: var(--border); }
    #gearTool .stat-header { font-weight: bold; color: var(--accent); margin-bottom: 10px; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; text-align: center;}
    #gearTool .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
    #gearTool .stat-row span { color: var(--muted); }
    
    /* Rigid Grid & Slots for Perfect Alignment */
    #gearTool .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; align-items: stretch; }
    
    #gearTool .slot { background: var(--panel); border-radius: 12px; padding: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; border: 1px solid var(--border); height: 100%; min-height: 160px;}
    
    #gearTool .slot-label { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 10px; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;}
    
    #gearTool .img-box { width: 100%; aspect-ratio: 1/1; background: #242b4d; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); margin: 0 auto; position: relative; flex: 0 0 auto;}
    #gearTool .img-box img { width: 100%; height: 100%; object-fit: cover; }
    
    #gearTool .img-box.empty-box { cursor: pointer; border: 1px dashed rgba(255,255,255,0.3); transition: 0.2s; }
    #gearTool .img-box.empty-box:hover { border-color: var(--accent); background: #2a325a; }
    
    #gearTool .btn { cursor: pointer; border: none; border-radius: 4px; padding: 6px; font-size: 11px; font-weight: bold; color: white; background: #3d4670; transition: 0.2s; width: 100%; margin:0; font-family: inherit;}
    #gearTool .btn:hover { background: #4e5a8f; }
    #gearTool .btn-plus { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); font-size: 24px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    
    #gearTool .actions-group { display: flex; flex-direction: column; gap: 4px; margin-top: auto; padding-top: 8px; width: 100%; }
    #gearTool .btn-clear { background: rgba(255, 77, 77, 0.15); color: var(--danger); border: 1px solid var(--danger); }
    #gearTool .btn-clear:hover { background: var(--danger); color: white; }

    /* Gear Modal CSS */
    .g-modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 2000; padding: 20px; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, sans-serif;}
    .g-modal-wrap.open { display: flex; }
    .g-modal-box { background: #101525; width: 100%; max-width: 500px; max-height: 90vh; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; color:#fff; text-align: left; }
    .g-modal-header { padding: 15px; background: #1a1f3a; display: flex; justify-content: space-between; align-items: center; gap: 10px;}
    .g-modal-body { padding: 15px; overflow-y: auto; flex: 1; }
    .g-modal-body .card { background: #202644; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: flex-start; gap: 15px; cursor: pointer; }
    .g-modal-body .card:hover { border-color: #7c9cff; }
    .g-modal-body .card img { width: 60px; height: 60px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); margin-top: 5px;}
    .g-modal-body .preview-area { background: #1a1f3a; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #7c9cff; font-size: 14px;}
    .g-modal-body .jewel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
    .g-modal-body .socket { background: #242b4d; padding: 8px; border-radius: 6px; font-size: 10px; cursor: pointer; text-align: center; border: 1px solid rgba(255,255,255,0.08); transition: 0.2s; }
    .g-modal-body .socket:hover { border-color: #7c9cff; }
    .g-modal-body .btn { cursor: pointer; border: none; border-radius: 4px; padding: 8px; font-size: 12px; font-weight: bold; color: white; background: #3d4670; width: 100%; }

    /* Mobile overrides */
    @media (max-width: 600px) {
        .container { padding: 10px; border-radius: 0; box-shadow: none; }
        .tier-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        #gearTool .top-bar { justify-content: center; }
        #gearTool .stats-container { flex-direction: column; gap: 5px; }
        #gearTool .stat-col-divider { width: 100%; height: 1px; margin: 5px 0; }
        
        #gearTool .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 5px; }

        #gearTool .slot { padding: 6px; min-height: 120px;}
        #gearTool .slot-label { font-size: 9px; margin-bottom: 4px; letter-spacing: -0.5px;}
        #gearTool .img-box { border-radius: 5px; }
        #gearTool .btn { padding: 5px 2px; font-size: 10px; }
        #gearTool .btn-plus { width: 30px; height: 30px; font-size: 20px; }
        #gearTool .actions-group { gap: 3px; padding-top: 4px;}
    }
</style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle">Lords Mobile Toolkit</h1>

    <div id="toolsMenu">
        <h2>Select a Tool</h2>
        <button class="menu-btn" onclick="openTool('speedTool')">Speed Up Calculator</button>
        <button class="menu-btn" onclick="openTool('gemTool')">Gem Prediction</button>
        <button class="menu-btn" onclick="openTool('troopTool')" style="background:#28a745">Troop Calculator</button>
        <button class="menu-btn" onclick="openTool('gearTool')" style="background:#7c9cff; color:#0f1220;">Gear Simulator</button>
    </div>

    <div id="speedTool" class="tool">
        <button class="menu-btn" onclick="backTools()" style="background:#6c757d; max-width:120px; margin: 0 auto 15px 0;">← Back</button>
        <h2>Speed Up Calculator</h2>
        <button class="menu-btn" onclick="toggleGuide('speedGuide')" style="max-width:150px; padding:8px; font-size:12px;">Toggle Guide</button>
        <div id="speedGuide" class="guide">Enter the quantity of each speed up item you have. The calculator will provide the total time.</div>
        
        <select id="speedEvent" class="tool-select">
            <option value="1">Normal Speed (100%)</option>
            <option value="1.2">120% Speed Event</option>
        </select>
        
        <input class="tool-input" id="d1" placeholder="1 min">
        <input class="tool-input" id="d5" placeholder="5 min">
        <input class="tool-input" id="d10" placeholder="10 min">
        <input class="tool-input" id="d15" placeholder="15 min">
        <input class="tool-input" id="d30" placeholder="30 min">
        <input class="tool-input" id="h1" placeholder="1 hour">
        <input class="tool-input" id="h3" placeholder="3 hour">
        <input class="tool-input" id="h8" placeholder="8 hour">
        <input class="tool-input" id="h15" placeholder="15 hour">
        <input class="tool-input" id="h24" placeholder="24 hour">
        <input class="tool-input" id="d3" placeholder="3 day">
        <input class="tool-input" id="d7" placeholder="7 day">
        <input class="tool-input" id="d14" placeholder="14 day">
        <input class="tool-input" id="d30s" placeholder="30 day">
        
        <button class="menu-btn" onclick="calculateSpeed()">Calculate Total</button>
        <button class="menu-btn" onclick="clearInputs('speedTool')" style="background:#6c757d">Clear All</button>
    </div>

    <div id="gemTool" class="tool">
        <button class="menu-btn" onclick="backTools()" style="background:#6c757d; max-width:120px; margin: 0 auto 15px 0;">← Back</button>
        <h2>Gem Prediction</h2>
        <button class="menu-btn" onclick="toggleGuide('gemGuide')" style="max-width:150px; padding:8px; font-size:12px;">Toggle Guide</button>
        <div id="gemGuide" class="guide">Enter your Estimated Gems or What you usually get from each source.</div>
        
        <input class="tool-input" id="colo" placeholder="Colosseum Gems (Every 3h)">
        <input class="tool-input" id="guild" placeholder="Daily Guild Gifts">
        <input class="tool-input" id="monster" placeholder="Daily Monster Hunt">
        <input class="tool-input" id="eventgems" placeholder="Weekly Event Gems">
        <input class="tool-input" id="treasure" placeholder="Treasure Trove Deposit">
        <input class="tool-input" id="basic" placeholder="Basic Interest %">
        <input class="tool-input" id="bonus" placeholder="Bonus Interest %">
        
        <button class="menu-btn" onclick="calculateGems()">Predict 30 Days</button>
        <button class="menu-btn" onclick="clearInputs('gemTool')" style="background:#6c757d">Clear All</button>
    </div>

    <div id="troopTool" class="tool">
        <button class="menu-btn" onclick="backTools()" style="background:#6c757d; max-width:120px; margin: 0 auto 15px 0;">← Back</button>
        <div class="sticky-stats">
            <div class="stat-item"><img id="h-army" class="game-icon"> <span id="live-a">0</span></div>
            <div class="stat-item"><img id="h-might" class="game-icon"> <span id="live-m">0</span></div>
        </div>
        <div class="settings-grid">
            <div class="input-group"><label>Training Speed %</label><input type="number" id="tSpeed" placeholder="0"></div>
            <div class="input-group"><label>T1/T2 Sub %</label><input type="number" id="s12" placeholder="0"></div>
            <div class="input-group"><label>T3/T4 Sub %</label><input type="number" id="s34" placeholder="0"></div>
            
            <div class="input-group" style="align-items: center;">
                <label>120% Event</label>
                <input type="checkbox" id="troopEvent" style="margin: 8px auto;">
            </div>
        </div>
        <div id="tier-container"></div>
        <button class="menu-btn" onclick="calculateTroops()" style="background:#28a745; max-width:100%;">CALCULATE RESOURCES</button>
        <button class="menu-btn" onclick="clearInputs('troopTool')" style="background:#6c757d; max-width:100%;">Reset All</button>
    </div>

    <div id="gearTool" class="tool">
        <button class="menu-btn" onclick="backTools()" style="background:#6c757d; max-width:120px; margin: 0 auto 10px 0;">← Back</button>
        
        <div class="wrap">
          <div class="top-bar">
            <div class="tabs">
              <button class="tab active" onclick="switchSet(0)">Set 1</button>
              <button class="tab" onclick="switchSet(1)">Set 2</button>
              <button class="tab" onclick="switchSet(2)">Set 3</button>
            </div>
            <button class="reset-all-btn" onclick="resetEntireSet()">Reset Entire Set</button>
          </div>

          <div class="stats-container" id="statsDisplay"></div>
          
          <div class="grid" id="slotsGrid"></div>
        </div>
    </div>
</div>

<div id="resultTab" class="resultTab">
    <div class="resultBox">
        <span class="closeBtn" onclick="closeResult()">X</span>
        <div id="resultContent"></div>
    </div>
</div>

<div class="g-modal-wrap" id="mainModal">
  <div class="g-modal-box">
    <div class="g-modal-header">
      <h3 id="modalTitle" style="margin:0;">Select</h3>
      <div style="display:flex; gap:8px;">
        <button class="btn" style="width:auto; padding:5px 10px; margin:0; font-size:12px;" onclick="toggleGearSort()">↕ Sort: Lvl</button>
        <button class="btn btn-clear" style="width:auto; padding:5px 15px; margin:0;" onclick="closeModal()">Close</button>
      </div>
    </div>
    <div class="g-modal-body" id="modalBody"></div>
  </div>
</div>

<script>
    // ==========================================
    // 1. GLOBAL NAVIGATION & UTILS
    // ==========================================
    function openTool(id){
        document.getElementById("toolsMenu").style.display = "none";
        document.getElementById("mainTitle").style.display = "none";
        document.getElementById(id).style.display = "block";
        if(id === 'gearTool') render();
    }
    
    function backTools(){
        document.getElementById("toolsMenu").style.display = "block";
        document.getElementById("mainTitle").style.display = "block";
        document.querySelectorAll(".tool").forEach(t => t.style.display = "none");
    }

    function toggleGuide(id){
        let g = document.getElementById(id);
        g.style.display = (g.style.display === "block") ? "none" : "block";
    }

    function showResult(content){
        document.getElementById("resultContent").innerHTML = content;
        document.getElementById("resultTab").style.display = "flex";
    }
    
    function closeResult(){ 
        document.getElementById("resultTab").style.display = "none"; 
    }

    function parseInput(id){
        let v = document.getElementById(id).value.replace(/,/g,'');
        return Number(v)||0;
    }
    
    function formatInput(input){
        let v = input.value.replace(/[^0-9]/g,'');
        if(v === ""){ input.value = ""; return; }
        input.value = Number(v).toLocaleString();
    }
    
    document.querySelectorAll(".tool-input, .troop-box input").forEach(i => {
        i.addEventListener("input", () => { if(i.type !== 'number' && i.type !== 'checkbox') formatInput(i); });
    });
    
    function clearInputs(toolId){
        document.querySelectorAll("#" + toolId + " input").forEach(i => { 
            if(i.type === 'checkbox') i.checked = false;
            else i.value = ""; 
        });
        if(toolId === 'troopTool') updateLiveStats();
    }

    // ==========================================
    // 2. SPEED UP & GEM CALCULATORS
    // ==========================================
    function calculateSpeed(){
        let multiplier = document.getElementById("speedEvent").value;
        let totalMinutes = parseInput("d1")*1 + parseInput("d5")*5 + parseInput("d10")*10 + parseInput("d15")*15 + parseInput("d30")*30 +
                           parseInput("h1")*60 + parseInput("h3")*180 + parseInput("h8")*480 + parseInput("h15")*900 + parseInput("h24")*1440 +
                           parseInput("d3")*4320 + parseInput("d7")*10080 + parseInput("d14")*20160 + parseInput("d30s")*43200;
        totalMinutes *= multiplier;
        let days = Math.floor(totalMinutes/1440), hours = Math.floor((totalMinutes%1440)/60), mins = Math.floor(totalMinutes%60);
        showResult("<h3>Total Speed</h3><div class='precise-time'>" + days + "d " + hours + "h " + mins + "m</div>");
    }

    function calculateGems(){
        let colo=parseInput("colo"), guild=parseInput("guild"), monster=parseInput("monster"), ev=parseInput("eventgems"), tr=parseInput("treasure"), ba=parseInput("basic"), bo=parseInput("bonus");
        let rColo=Math.floor(colo*8*30), rGuild=Math.floor(guild*30), rMonster=Math.floor(monster*15), rEvent=Math.floor(ev*3), rTreasure=Math.floor(tr*(100+ba+bo)/100);
        let total = rColo + rGuild + rMonster + rEvent + rTreasure;
        showResult("<h3>30-Day Forecast</h3><div class='resultGrid'><div>Colosseum</div><span>"+rColo.toLocaleString()+"</span><div>Guild</div><span>"+rGuild.toLocaleString()+"</span><div>Monster</div><span>"+rMonster.toLocaleString()+"</span><div>Event</div><span>"+rEvent.toLocaleString()+"</span><div>Treasure</div><span>"+rTreasure.toLocaleString()+"</span></div><div class='totalRow'><div>TOTAL GEMS</div><span>"+total.toLocaleString()+"</span></div>");
    }

    // ==========================================
    // 3. TROOP CALCULATOR
    // ==========================================
    const ICONS = {
        army: "Picsart_26-03-19_23-38-15-683.png", might: "Picsart_26-03-17_22-24-27-109.png",
        food: "Picsart_26-03-17_22-31-19-118.png", stone: "Picsart_26-03-17_22-31-37-917.png",
        wood: "Picsart_26-03-17_22-31-57-627.png", ore: "Picsart_26-03-17_22-32-16-895.png", gold: "Picsart_26-03-17_22-32-37-505.png"
    };
    const tiers = [1,2,3,4], types = ["Infantry", "Range", "Cavalry", "Siege"];
    const mPwr = {1:2, 2:8, 3:24, 4:36}, tBase = {1:15, 2:30, 3:60, 4:120};
    const rBase = {
        1: {f:50, w:50, s:0, o:50, g:0}, 2: {f:100, w:100, s:100, o:0, g:5},
        3: {f:150, w:0, s:150, o:150, g:10}, 4: {f:1000, w:1000, s:1000, o:1000, g:500}
    };

    function formatAbbr(n) {
        if (n >= 1e9) return (n/1e9).toFixed(1) + 'b';
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'm';
        return Math.floor(n).toLocaleString();
    }

    function updateLiveStats() {
        let a = 0, m = 0;
        document.querySelectorAll('.troop-box input').forEach(i => {
            let v = parseInt(i.value.replace(/,/g,'')) || 0;
            a += v; m += v * mPwr[i.dataset.t];
        });
        document.getElementById('live-a').innerText = formatAbbr(a);
        document.getElementById('live-m').innerText = formatAbbr(m);
    }

    function calculateTroops() {
        const spd = parseFloat(document.getElementById('tSpeed').value) || 0;
        const s12 = (parseFloat(document.getElementById('s12').value) || 0)/100;
        const s34 = (parseFloat(document.getElementById('s34').value) || 0)/100;
        const mult = (1 + (spd/100)) * (document.getElementById('troopEvent').checked ? 1.2 : 1);
        let r = { a:0, m:0, f:0, w:0, s:0, o:0, g:0, sec:0 };

        tiers.forEach(t => {
            let sub = t <= 2 ? s12 : s34;
            types.forEach(ty => {
                let q = parseInt(document.getElementById(`t${t}${ty}`).value.replace(/,/g,'')) || 0;
                if(q <= 0) return;
                r.a += q; r.m += q * mPwr[t]; r.sec += (q * tBase[t]) / mult;
                r.f += (rBase[t].f * (1-sub)) * q; r.w += (rBase[t].w * (1-sub)) * q;
                r.s += (rBase[t].s * (1-sub)) * q; r.o += (rBase[t].o * (1-sub)) * q;
                r.g += (rBase[t].g * (1-sub)) * q;
            });
        });

        let sT = Math.ceil(r.sec);
        let d = Math.floor(sT/86400), h = Math.floor((sT%86400)/3600), m = Math.floor((sT%3600)/60), s = sT%60;
        const line = (key, label, val) => `<div><img src="${ICONS[key]}" class="game-icon" onerror="this.style.display='none'"> ${label}</div><span>${formatAbbr(val)}</span>`;
        
        let content = `<h3>Precise Speeds Up Needed</h3><div class='precise-time'>${d}d ${h}h ${m}m ${s}s</div><div class='resultGrid'>` +
            line('army', 'Army', r.a) + line('might', 'Might', r.m) + line('food', 'Food', r.f) + 
            line('wood', 'Wood', r.w) + line('stone', 'Stone', r.s) + line('ore', 'Ore', r.o) + line('gold', 'Gold', r.g) +
            `</div><div class='totalRow'><div>EST. DAYS</div><span>${sT > 0 ? d+1 : 0} Days</span></div>`;
        
        showResult(content);
    }

    }

    function chooseJewelForSlot(slotIdx, jewelIdx) {
      const gear = sets[activeSetIdx][slotIdx];
      if (!gear) return;

      const usedNames = new Set(getEquippedJewelNames(slotIdx, jewelIdx));
      const currentJewel = gear.jewels[jewelIdx];

      const body = document.getElementById('modalBody');
      document.getElementById('modalTitle').textContent = "Choose Jewel";

      body.innerHTML = `
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn" style="background: #3d4670;" onclick="openJewelMenu(${slotIdx})">← Back</button>
            <button class="btn btn-clear" onclick="applyJewel(${slotIdx}, ${jewelIdx}, -1)">Remove This Jewel</button>
        </div>
        <div class="preview-area" style="margin-bottom: 12px;">
          Socket ${jewelIdx + 1}${currentJewel ? ` — current: <strong>${currentJewel.name}</strong>` : " — current: <strong>Empty</strong>"}
        </div>
      `;

      body.innerHTML += JEWEL_DATA.map((j, i) => {
        const alreadyUsed = usedNames.has(j.name);
        const isCurrent = currentJewel && currentJewel.name === j.name;

        let statsStr = Object.entries(j.stats).map(([k,v]) => `${k} +${v}%`).join(', ');
        return `
        <div class="card" onclick="${alreadyUsed && !isCurrent ? '' : `applyJewel(${slotIdx}, ${jewelIdx}, ${i})`}" style="
             opacity:${alreadyUsed && !isCurrent ? '0.45' : '1'};
             cursor:${alreadyUsed && !isCurrent ? 'not-allowed' : 'pointer'};
             border-color:${isCurrent ? '#7c9cff' : 'rgba(255,255,255,0.08)'};">
          <div style="width: 100%;">
             <strong>${j.name} Jewel${alreadyUsed && !isCurrent ? ' (Already used in this gear)' : ''}${isCurrent ? ' (Selected)' : ''}</strong>
             <div style="font-size: 11px; color: #b6bddf; margin-top: 3px;">${statsStr}</div>
          </div>
        </div>
      `}).join('');
    }

    function applyJewel(slotIdx, jewelIdx, dataIdx) {
      const gear = sets[activeSetIdx][slotIdx];
      if (!gear) return;

      if (dataIdx === -1) {
        gear.jewels[jewelIdx] = null;
        render();
        openJewelMenu(slotIdx);
        return;
      }

      const selected = JEWEL_DATA[dataIdx];
      const usedNames = new Set(getEquippedJewelNames(slotIdx, jewelIdx));

      if (usedNames.has(selected.name)) {
        alert(`"${selected.name}" is already used in another socket on this gear.`);
        return;
      }

      gear.jewels[jewelIdx] = JSON.parse(JSON.stringify(selected));
      render(); 
      openJewelMenu(slotIdx);
    }

    function closeModal() { 
        document.getElementById('mainModal').classList.remove('open'); 
        currentOpenSlot = null;
    }
    
    // Categorization Logic Helper
    function isEconomyStat(stat) {
        return /Speed|Production|Upkeep|Capacity/i.test(stat);
    }

    // UPDATED TO READ FROM THE NEW JEWEL.STATS OBJECT
    function render() {
      const strTotals = {};
      const ecoTotals = {};
      
      sets[activeSetIdx].forEach(item => {
        if(!item) return;
        
        // Add Gear Stats
        Object.entries(item.stats).forEach(([k,v]) => {
            if(isEconomyStat(k)) ecoTotals[k] = (ecoTotals[k]||0) + v;
            else strTotals[k] = (strTotals[k]||0) + v;
        });
        
        // Add Jewel Stats
        item.jewels.forEach(j => { 
            if(j && j.stats) {
                Object.entries(j.stats).forEach(([statName, statValue]) => {
                    if(isEconomyStat(statName)) ecoTotals[statName] = (ecoTotals[statName]||0) + statValue;
                    else strTotals[statName] = (strTotals[statName]||0) + statValue;
                });
            }
        });
      });

      const statsBox = document.getElementById('statsDisplay');
      
      const strHtml = Object.keys(strTotals).length ? Object.entries(strTotals).map(([k,v]) => `
        <div class="stat-row"><span>${k}</span><strong>${v.toFixed(2).replace(/\.00$/, '')}%</strong></div>
      `).join('') : '<div style="color:var(--muted); text-align:center; font-size:12px; margin-top:10px;">No Strength Stats</div>';
      
      const ecoHtml = Object.keys(ecoTotals).length ? Object.entries(ecoTotals).map(([k,v]) => `
        <div class="stat-row"><span>${k}</span><strong>${v.toFixed(2).replace(/\.00$/, '')}%</strong></div>
      `).join('') : '<div style="color:var(--muted); text-align:center; font-size:12px; margin-top:10px;">No Economy Stats</div>';
      
      statsBox.innerHTML = `
        <div class="stat-col">
            <div class="stat-header">⚔️ Strength</div>
            ${strHtml}
        </div>
        <div class="stat-col-divider"></div>
        <div class="stat-col">
            <div class="stat-header">🛡️ Economy</div>
            ${ecoHtml}
        </div>
      `;

      // Render Rigid Slots
      const grid = document.getElementById('slotsGrid');
      grid.innerHTML = SLOT_CONFIG.map((label, i) => {
        const item = sets[activeSetIdx][i];
        return `
          <div class="slot">
            <div class="slot-label">${label}</div>
            
            ${item ? `
              <div class="img-box" onclick="openGearSelection(${i})" style="cursor:pointer;" title="Click to change gear">
                <img src="${item.img || getImg(item.name)}" onerror="this.style.display='none'">
              </div>
              <div class="actions-group">
                <button class="btn" onclick="openJewelMenu(${i})">Jewels</button>
                <button class="btn btn-clear" onclick="clearSingleSlot(${i})">Clear</button>
              </div>
            ` : `
              <div class="img-box empty-box" onclick="openGearSelection(${i})" title="Click to add gear">
                <div class="btn-plus">+</div>
              </div>
              <div class="actions-group">
                </div>
            `}
          </div>
        `;
      }).join('');
    }

    // Init Gear
    render();
</script>
</body>
</html>
